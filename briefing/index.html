<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing — claw</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; }
  .hero { padding: 60px 24px 40px; text-align: center; background: linear-gradient(180deg, #1a1a2e 0%, #0f0f13 100%); }
  .hero .label { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #7b7b9a; margin-bottom: 12px; }
  .hero h1 { font-size: 28px; font-weight: 700; color: #fff; }
  .hero .date { font-size: 14px; color: #7b7b9a; margin-top: 8px; }
  .container { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }
  .archive { padding: 32px 0 0; }
  .archive h2 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #7b7b9a; margin-bottom: 16px; }
  .archive-list { display: flex; flex-direction: column; gap: 8px; }
  .archive-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1a1a2e; border-radius: 10px; text-decoration: none; color: #e8e8f0; transition: background 0.15s; }
  .archive-item:hover { background: #252540; }
  .archive-item .date { font-size: 13px; color: #7b7b9a; min-width: 90px; }
  .archive-item .title { font-size: 14px; }
  .empty { text-align: center; padding: 60px 0; color: #7b7b9a; font-size: 14px; }
</style>
</head>
<body>
<div class="hero">
  <div class="label">🦊 claw</div>
  <h1>Morning Briefing</h1>
  <div class="date">매일 아침 AI · 테크 · 비즈니스 인사이트</div>
</div>
<div class="container">
  <div class="archive">
    <h2>지난 브리핑</h2>
    <div class="archive-list" id="list">
      <div class="empty">아직 발행된 브리핑이 없어요.</div>
    </div>
  </div>
</div>
<script>
  // 날짜별 파일 목록을 자동으로 감지 (실제 발행 시 업데이트됨)
  const issues = [{date: "2026-04-04", label: "2026년 4월 4일"},{date: "2026-04-02", label: "2026년 4월 2일"},{date: "2026-04-01", label: "2026년 4월 1일"},{date: "2026-03-29", label: "2026년 3월 29일"}];
  if (issues.length > 0) {
    const list = document.getElementById('list');
    list.innerHTML = issues.map(i =>
      `<a class="archive-item" href="${i.date}.html">
        <span class="date">${i.label}</span>
        <span class="title">아침 브리핑 — ${i.label}</span>
      </a>`
    ).join('');
  }
</script>
</body>
</html>
